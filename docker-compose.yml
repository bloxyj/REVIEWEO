services:
  nginx:
    image: nginx:1.28-alpine
    container_name: revieweo-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - revieweo

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.front
    container_name: revieweo-frontend
    command: npm run web -- --port ${FRONTEND_PORT:-19006}
    environment:
      NODE_ENV: development
      EXPO_NO_TELEMETRY: "1"
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-19006}:19006"
    restart: unless-stopped
    networks:
      - revieweo

  backend:
    build:
      context: .
      dockerfile: Dockerfile.back
    container_name: revieweo-backend
    depends_on:
      - mysql
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DB:-revieweo}
      MYSQL_USER: ${MYSQL_USER:-revieweo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-revieweo_password}
      JWT_SECRET: ${JWT_SECRET:-revieweo-dev-secret-change-me}
      JWT_ISSUER: ${JWT_ISSUER:-revieweo-api}
      JWT_TTL: ${JWT_TTL:-3600}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    volumes:
      - ./backend:/var/www/html
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - revieweo

  mysql:
    image: mysql:8.4
    container_name: revieweo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DB:-revieweo}
      MYSQL_USER: ${MYSQL_USER:-revieweo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-revieweo_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    restart: unless-stopped
    networks:
      - revieweo


volumes:
  frontend_node_modules:
  mysql_data:

networks:
  revieweo:
    driver: bridge
